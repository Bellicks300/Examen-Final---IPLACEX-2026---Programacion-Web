{% extends "base.html" %}

{% block title %}Ejercicio 2{% endblock %}

{% block content %}
<section class="exercise-panel login-panel">
    <h1>Inicio de sesión</h1>
    <form action="{{ url_for('ejercicio2') }}" method="post" class="form-card">
        <label for="usuario">Ingresa tu nombre</label>
        <input type="text" id="usuario" name="usuario" value="{{ usuario }}" required>

        <label for="contrasena">Ingresa tu contraseña</label>
        <input type="password" id="contrasena" name="contrasena" required>

        <button type="submit">Verificar</button>
    </form>

    {% if mensaje %}
    <p class="login-inline-result {% if acceso_correcto %}ok{% else %}bad{% endif %}">{{ mensaje }}</p>
    {% endif %}

    <a class="back-link" href="{{ url_for('index') }}">Volver al menu</a>
</section>
{% endblock %}
